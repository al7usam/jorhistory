<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jordan Page</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    height: 100%;
    width: 100%;
    background: linear-gradient(135deg,#0d1b2a,#1b263b,#415a77);
    font-family: Arial, sans-serif;
}

.table-container {
    width: 100%;
    height: 100vh;
    padding: 20px;
}

table {
    width: 100%;
    height: 100vh;
    border-collapse: separate;
    border-spacing: 20px;
}

/* TOP ROW = 20% */
tr:first-child {
    height: 20%;
}

/* BOTTOM ROW = 80% */
tr:last-child {
    height: 80%;
}

td {
    border-radius: 20px;
    overflow: hidden;
    background: rgba(255,255,255,0.08);
    text-align: center;
}

/* VIDEO GENERAL */
video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

/* SECOND VIDEO BIGGER CONTROL */
.big-video {
    height: 100%;
    object-fit: contain;
}
</style>

</head>

<body>

<div class="table-container">
<table>

<!-- TOP ROW -->
<tr>
    <td style="width:25%">
        <video autoplay muted loop playsinline>
            <source src="jorflag.mp4">
        </video>
    </td>

    <td>
        <h2 style="color:#E6B89C">يوم العلم - الأردن</h2>
    </td>
</tr>

<!-- BOTTOM ROW -->
<tr>

    <td>
        <p style="color:white">Quotes Section</p>
    </td>

    <!-- FLAG VIDEO = 80% HEIGHT -->
    <td style="height:80%">
        <video id="historyVideo" autoplay loop playsinline>
            <source src="history1.mp4">
        </video>
    </td>

</tr>

</table>
</div>

<script>
const video = document.getElementById("historyVideo");

window.addEventListener("load", () => {
    video.play().then(() => {
        // try to UNMUTE after autoplay starts
        video.muted = false;
    }).catch(() => {
        console.log("Autoplay blocked with sound — user interaction required");
    });
});
</script>

</body>
</html>
