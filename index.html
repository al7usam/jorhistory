<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transparent Table - Jordanian Royal Quotes</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            min-height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: linear-gradient(135deg, #0d1b2a, #1b263b, #415a77);
            font-family: 'Segoe UI', 'Traditional Arabic', Tahoma, sans-serif;
        }

        .table-container {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 20px;
        }

        /* ❌ Removed fixed row heights so top row can expand naturally */
        tr {
            height: auto;
        }

        td {
            padding: 30px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            color: white;
            text-align: center;
            overflow: hidden;
        }

        td:first-child {
            width: 25%;
        }

        .video-cell {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 🔥 DOUBLED SIZE (100% → 200%) */
        .video-cell video {
            width: 120%;
            height: auto;
            transform: scale(2);
            transform-origin: center;
            border-radius: 20px;
        }

        .full-video-cell video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 20px;
        }

        .flag-day-title {
            font-size: 2.16rem;
            color: #E6B89C;
        }

        .flag-day-subtitle {
            font-size: 1.68rem;
            color: #E6B89C;
        }

    </style>
</head>

<body>

<div class="table-container">
    <table>

        <!-- TOP ROW -->
        <tr>
            <td class="video-cell">
                <video autoplay loop muted playsinline>
                    <source src="jorflag.mp4" type="video/mp4">
                </video>
            </td>

            <td>
                <h1 class="flag-day-title">يوم العلم - المملكة الأردنية الهاشمية</h1>
                <div class="flag-day-subtitle">رمز عِزٍّ وفَخَار</div>
            </td>
        </tr>

        <!-- BOTTOM ROW -->
        <tr>
            <td>
                <p>النصوص هنا</p>
            </td>

            <td class="full-video-cell">
                <video id="historyVideo" autoplay loop playsinline>
                    <source src="history1.mp4" type="video/mp4">
                </video>
            </td>
        </tr>

    </table>
</div>

<script>
    const video = document.getElementById('historyVideo');

    window.addEventListener('load', () => {
        video.muted = false;
        video.volume = 1;
        video.play().catch(() => {
            video.muted = false;
            video.play();
        });
    });
</script>

</body>
</html>
